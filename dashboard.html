<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라임 대시보드</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --lime: #c8f135;
  --dark: #0e1210;
  --dark2: #141a12;
  --card: #1a2018;
  --border: rgba(200,241,53,0.12);
  --text: #e8f0e0;
  --muted: #6b7c60;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

/* ── 로그인 ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(200,241,53,0.06) 0%, transparent 70%);
}
.login-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 48px 40px;
  width: 100%; max-width: 400px; text-align: center;
}
.login-logo { font-size: 28px; font-weight: 900; color: var(--lime); margin-bottom: 8px; letter-spacing: -1px; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 36px; }
.login-input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; font-size: 16px; color: var(--text);
  outline: none; margin-bottom: 14px;
  font-family: monospace; letter-spacing: 2px; text-align: center;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: rgba(200,241,53,0.5); }
.login-btn {
  width: 100%; background: var(--lime); color: #0e1210;
  border: none; border-radius: 10px; padding: 14px;
  font-size: 15px; font-weight: 800; cursor: pointer; transition: all 0.2s;
}
.login-btn:hover { background: #d4f560; transform: translateY(-1px); }
.login-error { color: #ff6b6b; font-size: 13px; margin-top: 12px; display: none; }

/* ── 대시보드 ── */
#dashboard { display: none; }

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(14,18,16,0.97); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-logo { font-size: 15px; font-weight: 800; color: var(--lime); }
.topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.refresh-btn {
  background: rgba(200,241,53,0.1); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 14px; color: var(--lime);
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.refresh-btn:hover { background: rgba(200,241,53,0.2); }
.logout-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 6px 14px; color: var(--muted);
  font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.logout-btn:hover { border-color: rgba(255,100,100,0.4); color: #ff8888; }
.last-updated { font-size: 11px; color: var(--muted); }

.dashboard-body { padding: 20px; max-width: 1400px; margin: 0 auto; }

/* ── KPI 카드 ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px; margin-bottom: 20px;
}
.kpi-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 16px;
  position: relative; overflow: hidden; transition: border-color 0.2s;
}
.kpi-card:hover { border-color: rgba(200,241,53,0.3); }
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--lime);
}
.kpi-label { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; }
.kpi-value { font-size: 32px; font-weight: 900; color: var(--lime); line-height: 1; margin-bottom: 4px; }
.kpi-sub { font-size: 11px; color: var(--muted); }

/* ── 차트 영역 ── */
.charts-grid {
  display: grid; grid-template-columns: 2fr 1fr;
  gap: 16px; margin-bottom: 16px;
}
.chart-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px;
}
.chart-title {
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
}
.chart-title::before {
  content: ''; display: inline-block;
  width: 3px; height: 13px; background: var(--lime); border-radius: 2px;
}
.chart-wrap { position: relative; height: 240px; }

/* ── 상담 테이블 ── */
.table-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px; margin-bottom: 20px; overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 8px 12px;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  color: var(--muted); border-bottom: 1px solid var(--border);
}
td {
  padding: 11px 12px; font-size: 12px; color: var(--text);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(200,241,53,0.03); }
.badge {
  display: inline-block; background: rgba(200,241,53,0.12); color: var(--lime);
  border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 700;
}
.badge-kakao { background: rgba(254,229,0,0.12); color: #FEE500; }
.badge-naver { background: rgba(3,199,90,0.12); color: #03C75A; }
.badge-google { background: rgba(66,133,244,0.12); color: #4285F4; }

/* ── 로딩/에러 ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 180px; color: var(--muted); font-size: 13px; gap: 10px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border); border-top-color: var(--lime);
  border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { color: #ff6b6b; font-size: 12px; text-align: center; padding: 20px; }

/* ── 모바일 ── */
@media (max-width: 700px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
  .dashboard-body { padding: 12px; }
  .topbar { padding: 0 12px; }
  .kpi-card { padding: 16px 12px; }
  .kpi-value { font-size: 26px; }
}
</style>
</head>
<body>

<!-- ── 로그인 ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🍋 라임</div>
    <div class="login-sub">관리자 대시보드</div>
    <input type="password" class="login-input" id="pw-input"
      placeholder="비밀번호 입력"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error">❌ 비밀번호가 틀렸습니다</div>
  </div>
</div>

<!-- ── 대시보드 ── -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">🍋 라임 대시보드</div>
    <div class="topbar-right">
      <span class="last-updated" id="last-updated"></span>
      <button class="refresh-btn" onclick="loadAll()">🔄 새로고침</button>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="dashboard-body">

    <!-- KPI -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">총 방문자</div>
        <div class="kpi-value" id="kpi-total-visits">…</div>
        <div class="kpi-sub">누적 전체</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">오늘 방문자</div>
        <div class="kpi-value" id="kpi-today-visits">…</div>
        <div class="kpi-sub">오늘 기준</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">총 상담신청</div>
        <div class="kpi-value" id="kpi-total-consults">…</div>
        <div class="kpi-sub">누적 전체</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">오늘 상담신청</div>
        <div class="kpi-value" id="kpi-today-consults">…</div>
        <div class="kpi-sub">오늘 기준</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">전환율</div>
        <div class="kpi-value" id="kpi-rate">…</div>
        <div class="kpi-sub">방문 → 상담</div>
      </div>
    </div>

    <!-- 차트 -->
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">일별 방문자 · 상담신청 (최근 30일)</div>
        <div class="chart-wrap">
          <canvas id="daily-chart" style="display:none;"></canvas>
          <div class="loading" id="daily-loading"><div class="spinner"></div> 로딩 중...</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">유입 경로 분포</div>
        <div class="chart-wrap">
          <canvas id="source-chart" style="display:none;"></canvas>
          <div class="loading" id="source-loading"><div class="spinner"></div> 로딩 중...</div>
        </div>
      </div>
    </div>

    <!-- 상담 테이블 -->
    <div class="table-card">
      <div class="chart-title">최근 상담 신청 (최근 20건)</div>
      <div id="consult-loading" class="loading"><div class="spinner"></div> 로딩 중...</div>
      <table id="consult-table" style="display:none;">
        <thead>
          <tr>
            <th>접수시간</th><th>이름</th><th>연락처</th>
            <th>유형</th><th>유입경로</th><th>접속지역</th>
          </tr>
        </thead>
        <tbody id="consult-tbody"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
// ── 설정 ──
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxlmLGhY7bVnpXwzS7KC3YkG7BKt3cnxJJ1igeRZTWBuABWFD69Hn4jjprwheeBAODY/exec';
var DASH_PW = 'lime2025!'; // ← GAS 코드와 동일하게 유지

var savedPw = '';
var dailyChart = null, sourceChart = null;
var cbCount = 0; // JSONP 콜백 카운터

// ── JSONP 호출 (CORS 완전 우회) ──
function jsonpCall(action, callback) {
  var cbName = '__cb_' + action + '_' + (++cbCount);

  window[cbName] = function(data) {
    try { delete window[cbName]; } catch(e) {}
    var old = document.getElementById(cbName);
    if (old) old.parentNode.removeChild(old);
    callback(data);
  };

  var url = GAS_URL
    + '?pw='       + encodeURIComponent(savedPw)
    + '&action='   + action
    + '&callback=' + cbName
    + '&t='        + Date.now(); // 캐시 방지

  var script = document.createElement('script');
  script.id  = cbName;
  script.src = url;
  script.onerror = function() {
    window[cbName] = null;
    showError(action);
  };
  document.head.appendChild(script);
}

function showError(section) {
  var loadingId = section === 'consults' ? 'consult-loading'
                : section === 'daily'   ? 'daily-loading'
                : section === 'sources' ? 'source-loading' : null;
  if (loadingId) {
    var el = document.getElementById(loadingId);
    if (el) el.innerHTML = '<span class="error-msg">⚠️ 데이터 로드 실패<br>GAS 재배포 후 새로고침</span>';
  }
}

// ── 로그인 ──
function doLogin() {
  var pw = document.getElementById('pw-input').value.trim();
  if (pw === DASH_PW) {
    savedPw = pw;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function doLogout() {
  savedPw = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

// ── 전체 로드 ──
function loadAll() {
  document.getElementById('last-updated').textContent = '로딩 중...';
  // 로딩 상태 리셋
  ['daily-loading','source-loading','consult-loading'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) { el.style.display = 'flex'; el.innerHTML = '<div class="spinner"></div> 로딩 중...'; }
  });
  document.getElementById('daily-chart').style.display = 'none';
  document.getElementById('source-chart').style.display = 'none';
  document.getElementById('consult-table').style.display = 'none';

  loadSummary();
  loadDaily();
  loadSources();
  loadConsults();
}

// ── KPI 요약 ──
function loadSummary() {
  jsonpCall('summary', function(d) {
    if (d.error) { return; }
    document.getElementById('kpi-total-visits').textContent   = Number(d.totalVisits).toLocaleString();
    document.getElementById('kpi-today-visits').textContent   = Number(d.todayVisits).toLocaleString();
    document.getElementById('kpi-total-consults').textContent = Number(d.totalConsults).toLocaleString();
    document.getElementById('kpi-today-consults').textContent = Number(d.todayConsults).toLocaleString();
    document.getElementById('kpi-rate').textContent           = d.conversionRate + '%';
    document.getElementById('last-updated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
  });
}

// ── 일별 차트 ──
function loadDaily() {
  jsonpCall('daily', function(d) {
    document.getElementById('daily-loading').style.display = 'none';
    document.getElementById('daily-chart').style.display = 'block';
    var ctx = document.getElementById('daily-chart').getContext('2d');
    if (dailyChart) dailyChart.destroy();

    // 데이터 없으면 더미 표시
    if (!d.labels || d.labels.length === 0) {
      d = { labels:['데이터 없음'], visits:[0], consults:[0] };
    }

    dailyChart = new Chart(ctx, {
      data: {
        labels: d.labels,
        datasets: [
          {
            type: 'bar', label: '방문자',
            data: d.visits,
            backgroundColor: 'rgba(200,241,53,0.2)',
            borderColor: 'rgba(200,241,53,0.5)',
            borderWidth: 1, borderRadius: 3,
          },
          {
            type: 'line', label: '상담신청',
            data: d.consults,
            borderColor: '#c8f135', backgroundColor: 'rgba(200,241,53,0.1)',
            borderWidth: 2, tension: 0.4,
            pointRadius: 3, pointBackgroundColor: '#c8f135', fill: true,
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#6b7c60', font: { size: 11 } } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#6b7c60', font: { size: 9 } } },
          y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#6b7c60' }, beginAtZero: true }
        }
      }
    });
  });
}

// ── 유입경로 도넛 차트 ──
function loadSources() {
  jsonpCall('sources', function(d) {
    document.getElementById('source-loading').style.display = 'none';
    document.getElementById('source-chart').style.display = 'block';
    var ctx = document.getElementById('source-chart').getContext('2d');
    if (sourceChart) sourceChart.destroy();

    if (!d.labels || d.labels.length === 0) {
      d = { labels:['데이터 없음'], values:[1] };
    }

    var colors = ['#c8f135','#FEE500','#03C75A','#4285F4','#E1306C','#6b7c60','#ff9f43'];
    sourceChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: d.labels,
        datasets: [{
          data: d.values,
          backgroundColor: colors.slice(0, d.labels.length),
          borderColor: '#1a2018', borderWidth: 3,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { color: '#6b7c60', font: { size: 11 }, padding: 14 } }
        },
        cutout: '62%'
      }
    });
  });
}

// ── 상담 테이블 ──
function loadConsults() {
  jsonpCall('consults', function(d) {
    document.getElementById('consult-loading').style.display = 'none';
    var tbody = document.getElementById('consult-tbody');
    tbody.innerHTML = '';

    if (!d.data || d.data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px;">상담 신청 데이터가 없습니다</td></tr>';
    } else {
      d.data.forEach(function(row) {
        var src = row.source || '-';
        var cls = src.indexOf('네이버') > -1 || src.indexOf('Naver') > -1 ? 'badge-naver'
                : src.indexOf('구글')   > -1 || src.indexOf('Google')> -1 ? 'badge-google'
                : src.indexOf('카카오') > -1 || src.indexOf('Kakao') > -1 ? 'badge-kakao' : '';
        tbody.innerHTML +=
          '<tr>' +
          '<td style="color:var(--muted);font-size:11px;">' + (row.time||'-') + '</td>' +
          '<td><strong>' + (row.name||'-') + '</strong></td>' +
          '<td style="font-family:monospace;font-size:11px;">' + (row.phone||'-') + '</td>' +
          '<td><span class="badge">' + (row.type||'-') + '</span></td>' +
          '<td><span class="badge ' + cls + '">' + src + '</span></td>' +
          '<td style="color:var(--muted);font-size:11px;">' + (row.region||'-') + '</td>' +
          '</tr>';
      });
    }
    document.getElementById('consult-table').style.display = 'table';
  });
}

// 5분마다 자동 새로고침
setInterval(function(){ if (savedPw) loadAll(); }, 5 * 60 * 1000);
</script>
</body>
</html>
